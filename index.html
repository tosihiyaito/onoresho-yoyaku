<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>己書教室 ご予約</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    :root{
      --bg:#faf6ef; --card:#ffffff; --ink:#3b332a; --sub:#8a7d6b;
      --accent:#9c6b3f; --accent-dark:#7d5430; --line:#e8ddca;
      --ok:#2e7d52; --okbg:#e7f3ec; --full:#b23b3b; --fullbg:#f3e7e7; --gray:#9a9a9a;
      --danger:#b23b3b; --dangerdark:#922f2f;
    }
    *{box-sizing:border-box;}
    body{margin:0;background:var(--bg);color:var(--ink);
      font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;
      -webkit-text-size-adjust:100%;}
    header{background:var(--accent);color:#fff;padding:18px 16px;text-align:center;}
    header h1{margin:0;font-size:19px;letter-spacing:.05em;}
    header p{margin:5px 0 0;font-size:12px;opacity:.9;}
    .wrap{max-width:560px;margin:0 auto;padding:14px;}
    .line-status{display:none;font-size:13px;color:var(--ok);background:var(--okbg);
      border:1px solid #cfe6d8;border-radius:10px;padding:8px 12px;margin:0 0 10px;}
    .note{font-size:13px;color:var(--sub);background:#fff;border:1px solid var(--line);
      border-radius:10px;padding:10px 12px;margin:0 0 14px;line-height:1.6;}
    .card{background:var(--card);border:1px solid var(--line);border-radius:14px;
      padding:14px;margin:0 0 12px;display:flex;justify-content:space-between;
      align-items:center;gap:12px;box-shadow:0 1px 2px rgba(0,0,0,.04);}
    .card.full{opacity:.7;}
    .card.tap{cursor:pointer;}
    .card.tap:active{transform:scale(.99);}
    .card .date{font-size:17px;font-weight:700;}
    .card .time{font-size:14px;color:var(--sub);margin-top:2px;}
    .card .venue{font-size:14px;margin-top:6px;}
    .card .note2{font-size:12px;color:var(--sub);margin-top:4px;}
    .badge{flex:0 0 auto;text-align:center;border-radius:10px;padding:9px 10px;
      font-weight:700;font-size:14px;min-width:82px;}
    .badge.ok{color:var(--ok);background:var(--okbg);}
    .badge.full{color:var(--full);background:var(--fullbg);}
    .badge.closed{color:var(--gray);background:#eeeeee;}
    .btn{display:block;width:100%;border:none;border-radius:12px;padding:14px;
      font-size:16px;font-weight:700;cursor:pointer;}
    .btn.primary{background:var(--accent);color:#fff;}
    .btn.primary:active{background:var(--accent-dark);}
    .btn.ghost{background:#ececec;color:var(--ink);}
    .btn.danger{background:var(--danger);color:#fff;}
    .btn.danger:active{background:var(--dangerdark);}
    .btn:disabled{opacity:.5;}
    .spin{width:34px;height:34px;border:4px solid var(--line);border-top-color:var(--accent);
      border-radius:50%;animation:sp 1s linear infinite;margin:36px auto;}
    @keyframes sp{to{transform:rotate(360deg);}}
    .empty{text-align:center;color:var(--sub);padding:42px 10px;line-height:1.7;}
    .mask{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;
      align-items:flex-end;justify-content:center;z-index:10;}
    .mask.show{display:flex;}
    .sheet{background:#fff;width:100%;max-width:560px;border-radius:18px 18px 0 0;
      padding:18px 16px 26px;max-height:92vh;overflow:auto;}
    .sheet h2{margin:0 0 6px;font-size:17px;}
    .sel{background:var(--bg);border:1px solid var(--line);border-radius:10px;
      padding:12px;margin:8px 0 4px;font-size:14px;line-height:1.6;}
    label{display:block;font-size:13px;color:var(--sub);margin:14px 0 5px;}
    .req{color:var(--full);font-size:12px;}
    input,select{width:100%;padding:13px;font-size:16px;border:1px solid var(--line);
      border-radius:10px;background:#fff;color:var(--ink);}
    .err{color:var(--full);font-size:13px;margin-top:10px;min-height:18px;line-height:1.5;}
    .row-btns{margin-top:16px;display:flex;gap:10px;}
    .done{text-align:center;padding:8px 4px;}
    .done .num{font-size:20px;font-weight:800;color:var(--accent);letter-spacing:.05em;
      background:var(--bg);border:1px dashed var(--accent);border-radius:10px;padding:12px;margin:12px 0;}
    /* 予約一覧（キャンセル）用 */
    .rcard{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px;margin:0 0 12px;line-height:1.7;}
    .rcard .ttl{font-size:17px;font-weight:700;}
    .rcard .rno{font-size:12px;color:var(--sub);margin:6px 0 12px;}
    .rcard.done2{border-color:var(--ok);}
    .rcard.done2 b{color:var(--ok);}
    .hint{font-size:12px;color:var(--danger);margin-bottom:8px;}
  </style>
</head>
<body>
  <header>
    <h1 id="ttl">己書教室 ご予約</h1>
    <p id="sub">ご希望の回をえらんでください</p>
  </header>

  <div class="wrap">
    <div class="line-status" id="line-status"></div>
    <div class="note" id="note">満員の回は「満員」と表示され、ご予約いただけません。<br>各会場とも定員に達し次第、受付を終了します。</div>
    <div id="list"><div class="spin"></div></div>
  </div>

  <!-- 予約フォーム -->
  <div class="mask" id="mask">
    <div class="sheet">
      <div id="form-view">
        <h2>ご予約フォーム</h2>
        <div class="sel" id="sel"></div>
        <label>お名前 <span class="req">※必須</span></label>
        <input id="f-name" type="text" placeholder="例：山田 花子" autocomplete="name">
        <label>人数 <span class="req">※必須</span></label>
        <select id="f-people"></select>
        <label>メールアドレス（任意・ご入力で確認メールが届きます）</label>
        <input id="f-email" type="email" placeholder="例：example@gmail.com" autocomplete="email">
        <label>ご連絡先（電話番号・任意）</label>
        <input id="f-contact" type="tel" placeholder="例：090-1234-5678" autocomplete="tel">
        <div class="err" id="err"></div>
        <div class="row-btns">
          <button class="btn ghost"   type="button" onclick="closeSheet()">閉じる</button>
          <button class="btn primary" type="button" id="submitBtn" onclick="doSubmit()">予約する</button>
        </div>
      </div>
      <div id="done-view" style="display:none;">
        <div class="done">
          <h2>ご予約を受け付けました</h2>
          <p style="margin:6px 0 0;font-size:13px;color:#8a7d6b;">予約番号</p>
          <div class="num" id="done-num"></div>
          <div id="done-detail" style="font-size:14px;"></div>
          <p style="font-size:13px;color:#8a7d6b;margin-top:16px;">（メールをご入力の方には確認メールも届きます）<br>この画面を閉じてLINEにお戻りください。</p>
          <button class="btn primary" type="button" onclick="closeSheet(true)" style="margin-top:8px;">閉じる</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ===== 設定 =====
    var GAS_API = 'https://script.google.com/macros/s/AKfycbxH14URfJIWh1fQgMnwXPQOZ_h0KMIv3Onn-gbMSR3zm9bhHrm91b1_tQZ5h_EumksX0Q/exec';
    var LIFF_ID = '2010430657-RE0LHqd6';

    var LINE_USER = { id: '', name: '' };
    var MODE = (new URLSearchParams(location.search)).get('page'); // 'cancel' なら予約一覧
    var SESSIONS = [];
    var current = null;

    // GAS API 呼び出し（GET）
    function api(params){
      var q = Object.keys(params).map(function(k){ return k + '=' + encodeURIComponent(params[k]); }).join('&');
      var url = GAS_API + '?' + q + '&_t=' + Date.now();
      return fetch(url).then(function(r){ return r.json(); });
    }

    // ===== 起動：LIFFでログイン情報を取得してから開始 =====
    function bootstrap(){
      if (typeof liff === 'undefined') { start(); return; }
      liff.init({ liffId: LIFF_ID }).then(function(){
        if (liff.isLoggedIn()) {
          liff.getProfile().then(function(p){
            LINE_USER.id = p.userId || '';
            LINE_USER.name = p.displayName || '';
            var el = document.getElementById('line-status');
            if (LINE_USER.name) { el.textContent = '✅ ' + LINE_USER.name + ' さん'; el.style.display = ''; }
            start();
          }).catch(function(){ start(); });
        } else {
          if (MODE === 'cancel') { liff.login(); }  // 予約一覧には本人確認が必要
          else { start(); }                          // 予約だけなら手入力でも進める
        }
      }).catch(function(){ start(); });
    }

    function start(){
      if (MODE === 'cancel') { initCancelView(); loadMyReservations(); }
      else { initBookingView(); loadSessions(); }
    }

    // ========================= 予約モード =========================
    function initBookingView(){
      document.getElementById('ttl').textContent = '己書教室 ご予約';
      document.getElementById('sub').textContent = 'ご希望の回をえらんでください';
    }

    function loadSessions(){
      document.getElementById('list').innerHTML = '<div class="spin"></div>';
      api({ action: 'sessions' })
        .then(function(res){ renderSessions((res && res.sessions) || []); })
        .catch(function(){ document.getElementById('list').innerHTML = '<div class="empty">読み込みに失敗しました。<br>時間をおいて再度お試しください。</div>'; });
    }

    function renderSessions(sessions){
      SESSIONS = sessions || [];
      var el = document.getElementById('list');
      if(!SESSIONS.length){ el.innerHTML = '<div class="empty">現在、受付中の教室はありません。<br>またのご案内をお待ちください。</div>'; return; }
      el.innerHTML = '';
      SESSIONS.forEach(function(s){
        var card = document.createElement('div');
        card.className = 'card' + ((!s.isOpen || s.isFull) ? ' full' : '');
        var badge;
        if(!s.isOpen){ badge = '<div class="badge closed">受付停止</div>'; }
        else if(s.isFull){ badge = '<div class="badge full">満員</div>'; }
        else {
          badge = '<div class="badge ok">残り' + s.remaining + '席</div>';
          card.className += ' tap';
          card.addEventListener('click', (function(id){ return function(){ openForm(id); }; })(s.id));
        }
        card.innerHTML =
            '<div>'
          +   '<div class="date">' + fmtDate(s.date) + '（' + s.weekday + '）</div>'
          +   '<div class="time">' + s.start + '〜' + s.end + '</div>'
          +   '<div class="venue">📍 ' + esc(s.venue) + '</div>'
          +   (s.note ? '<div class="note2">' + esc(s.note) + '</div>' : '')
          + '</div>'
          + badge;
        el.appendChild(card);
      });
    }

    function openForm(id){
      current = null;
      for(var i=0;i<SESSIONS.length;i++){ if(SESSIONS[i].id===id){ current=SESSIONS[i]; break; } }
      if(!current) return;
      document.getElementById('form-view').style.display = '';
      document.getElementById('done-view').style.display = 'none';
      document.getElementById('f-name').value    = LINE_USER.name || '';
      document.getElementById('f-email').value   = '';
      document.getElementById('f-contact').value = '';
      document.getElementById('err').textContent = '';
      var max = Math.min(current.remaining, 10);
      var sel = document.getElementById('f-people');
      sel.innerHTML = '';
      for(var n=1;n<=max;n++){ var o=document.createElement('option'); o.value=n; o.textContent=n+'名'; sel.appendChild(o); }
      document.getElementById('sel').innerHTML =
          '<b>' + fmtDate(current.date) + '（' + current.weekday + '）' + current.start + '〜' + current.end + '</b><br>'
        + '📍 ' + esc(current.venue) + '　／　残り' + current.remaining + '席';
      var btn = document.getElementById('submitBtn');
      btn.disabled=false; btn.textContent='予約する';
      document.getElementById('mask').classList.add('show');
    }

    function doSubmit(){
      if(!current) return;
      var name=document.getElementById('f-name').value.trim();
      var people=parseInt(document.getElementById('f-people').value,10)||0;
      var email=document.getElementById('f-email').value.trim();
      var contact=document.getElementById('f-contact').value.trim();
      var err=document.getElementById('err'); err.textContent='';
      if(!name){ err.textContent='お名前を入力してください。'; return; }
      if(people<1){ err.textContent='人数を選んでください。'; return; }
      if(email && !/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){ err.textContent='メールアドレスの形式をご確認ください。'; return; }
      var btn=document.getElementById('submitBtn'); btn.disabled=true; btn.textContent='送信中…';
      api({ action:'submit', id:current.id, name:name, people:people, contact:contact, email:email, uid:LINE_USER.id, lname:LINE_USER.name })
        .then(function(res){ onSubmitDone(res); })
        .catch(function(){ btn.disabled=false; btn.textContent='予約する'; err.textContent='通信エラーが発生しました。もう一度お試しください。'; });
    }

    function onSubmitDone(res){
      var btn=document.getElementById('submitBtn');
      if(res && res.ok){
        document.getElementById('form-view').style.display='none';
        document.getElementById('done-view').style.display='';
        document.getElementById('done-num').textContent=res.reservationNo;
        var s=res.session||{};
        document.getElementById('done-detail').innerHTML =
          fmtDate(s.date)+'（'+(s.weekday||'')+'）'+s.start+'〜'+s.end+'<br>📍 '+esc(s.venue);
        loadSessions();
      } else {
        btn.disabled=false; btn.textContent='予約する';
        document.getElementById('err').textContent=(res&&res.message)?res.message:'予約できませんでした。';
        if(res && (res.reason==='full'||res.reason==='over'||res.reason==='closed')) loadSessions();
      }
    }

    function closeSheet(reload){
      document.getElementById('mask').classList.remove('show');
      if(reload) loadSessions();
    }

    // ========================= 予約一覧・キャンセルモード =========================
    function initCancelView(){
      document.getElementById('ttl').textContent = '予約の確認・キャンセル';
      document.getElementById('sub').textContent = 'あなたのご予約一覧';
      document.getElementById('note').innerHTML = 'LINEでログイン中のあなたのご予約です。キャンセルしたい回の「キャンセルする」を押してください。';
    }

    function loadMyReservations(){
      var el = document.getElementById('list');
      if(!LINE_USER.id){
        el.innerHTML = '<div class="empty">LINEのメニューから開いてください。<br>（ご本人確認のためLINEログインが必要です）</div>';
        return;
      }
      el.innerHTML = '<div class="spin"></div>';
      api({ action:'my', uid:LINE_USER.id })
        .then(function(res){ renderMyReservations((res && res.reservations) || []); })
        .catch(function(){ el.innerHTML = '<div class="empty">読み込みに失敗しました。<br>時間をおいて再度お試しください。</div>'; });
    }

    function renderMyReservations(list){
      var el = document.getElementById('list');
      if(!list.length){ el.innerHTML = '<div class="empty">現在、ご予約はありません。</div>'; return; }
      el.innerHTML = '';
      list.forEach(function(r){
        var c = document.createElement('div');
        c.className = 'rcard';
        c.innerHTML =
            '<div class="ttl">' + esc(r.when) + '</div>'
          + '<div>📍 ' + esc(r.venue) + '　／　' + esc(String(r.people)) + '名</div>'
          + '<div class="rno">予約番号：' + esc(r.reservationNo) + '</div>'
          + '<button class="btn danger" type="button">この予約をキャンセルする</button>'
          + '<div class="confirm" style="display:none;margin-top:12px;">'
          +   '<div class="hint">本当にキャンセルしますか？（元に戻せません）</div>'
          +   '<div class="row-btns" style="margin-top:0;">'
          +     '<button class="btn ghost yameru" type="button">やめる</button>'
          +     '<button class="btn danger yes" type="button">はい、キャンセル</button>'
          +   '</div>'
          + '</div>';
        var cancelBtn = c.querySelector('.btn.danger');
        var confirm = c.querySelector('.confirm');
        var yesBtn = c.querySelector('.yes');
        cancelBtn.addEventListener('click', function(){ cancelBtn.style.display='none'; confirm.style.display=''; });
        c.querySelector('.yameru').addEventListener('click', function(){ confirm.style.display='none'; cancelBtn.style.display=''; });
        yesBtn.addEventListener('click', function(){ doCancel(r.reservationNo, c, yesBtn); });
        el.appendChild(c);
      });
    }

    function doCancel(no, cardEl, yesBtn){
      yesBtn.disabled = true; yesBtn.textContent = 'キャンセル中…';
      api({ action:'cancel', no:no })
        .then(function(res){
          if(res && res.ok){
            cardEl.className = 'rcard done2';
            cardEl.innerHTML = '<b>キャンセルが完了しました。</b><br>' + esc(res.when||'') + '　' + esc(res.venue||'') + '<br>またのご参加をお待ちしております。';
          } else {
            yesBtn.disabled=false; yesBtn.textContent='はい、キャンセル';
            alert((res && res.message) || 'キャンセルできませんでした。');
          }
        })
        .catch(function(){ yesBtn.disabled=false; yesBtn.textContent='はい、キャンセル'; alert('通信エラーが発生しました。'); });
    }

    // ===== 共通 =====
    function fmtDate(d){ if(!d) return ''; var p=String(d).split('-'); if(p.length<3) return d; return Number(p[1])+'/'+Number(p[2]); }
    function esc(t){ return String(t==null?'':t).replace(/[&<>"']/g,function(m){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]; }); }

    document.getElementById('mask').addEventListener('click', function(e){ if(e.target.id==='mask') closeSheet(); });
    window.addEventListener('load', bootstrap);
  </script>
</body>
</html>
